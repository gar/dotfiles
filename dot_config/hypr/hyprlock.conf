# hyprlock — lock screen config
# Gruvbox Material colours, JetBrains Mono Nerd Font

general {
    grace = 2
    hide_cursor = true
}

background {
    monitor =
    color = rgba(282828ff)
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(d4be98ff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color = rgba(928374ff)
    font_size = 18
    font_family = Inter
    position = 0, 40
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(89b482ff)
    inner_color = rgba(32302fff)
    font_color = rgba(d4be98ff)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    fail_color = rgba(ea6962ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -60
    halign = center
    valign = center
}
