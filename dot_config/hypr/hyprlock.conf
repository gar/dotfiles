# hyprlock — lock screen config
# Colours sourced from colors.conf, generated by: flavours apply gruvbox-material
source = ~/.config/hypr/colors.conf

general {
    grace = 2
    hide_cursor = true
}

background {
    monitor =
    color = $color_bg0
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $color_fg0
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color = $color_grey1
    font_size = 18
    font_family = Inter
    position = 0, 40
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    outer_color = $color_aqua
    inner_color = $color_bg1
    font_color = $color_fg0
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    fail_color = $color_red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -60
    halign = center
    valign = center
}
