# =============================================================================
# Hyprland config — Dell laptop, Intel iGPU, Gruvbox Material theme
# =============================================================================

# ---------------------------------------------------------------------------
# Gruvbox Material (medium background, material foreground) colour palette
# ---------------------------------------------------------------------------
# bg0     = #282828   bg1     = #32302f   bg2     = #45403d
# bg3     = #504945   bg4     = #665c54
# fg0     = #d4be98   fg1     = #ddc7a1
# red     = #ea6962   orange  = #e78a4e   yellow  = #d8a657
# green   = #a9b665   aqua    = #89b482   blue    = #7daea3   purple  = #d3869b
# grey0   = #7c6f64   grey1   = #928374   grey2   = #a89984

$mainMod = SUPER

# ---------------------------------------------------------------------------
# Monitor
# ---------------------------------------------------------------------------
# Integer scaling only — fractional scaling is expensive on older Intel iGPUs.
# Replace "preferred" with your actual resolution, e.g. "1920x1080@60"
monitor = ,preferred,auto,1

# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------

# Wayland toolkit backends
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = _JAVA_AWT_WM_NONEREPARENTING,1

# XDG (required for portals and screensharing)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Intel VA-API driver.
# Use i965 for Haswell (4th-gen, HD 4000/4600/5000).
# Change to iHD for Broadwell (5th-gen, HD 5500/6000) and newer.
# Run `vainfo` to confirm the right driver is working.
env = LIBVA_DRIVER_NAME,i965
env = VDPAU_DRIVER,va_gl

# Cursor
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,default

# Qt theming (handled by qt6ct)
env = QT_QPA_PLATFORMTHEME,qt6ct

# ---------------------------------------------------------------------------
# Startup
# ---------------------------------------------------------------------------
exec-once = hyprpolkitagent
exec-once = hypridle
exec-once = hyprpaper
exec-once = waybar
exec-once = swaync
exec-once = wl-paste --watch cliphist store

# GTK theme — set dark mode and Inter as the UI font
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface gtk-theme "Gruvbox-Material-Dark"
exec = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"
exec = gsettings set org.gnome.desktop.interface cursor-theme "default"
exec = gsettings set org.gnome.desktop.interface font-name "Inter 11"

# ---------------------------------------------------------------------------
# Input
# ---------------------------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # active border: aqua/teal; inactive border: bg4
    col.active_border = rgba(89b482ff) rgba(7daea3ff) 45deg
    col.inactive_border = rgba(665c54ff)

    layout = dwindle
    resize_on_border = true
}

# ---------------------------------------------------------------------------
# Decoration — blur and shadows disabled for Intel iGPU performance
# ---------------------------------------------------------------------------
decoration {
    rounding = 6

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }

    dim_inactive = false
}

# ---------------------------------------------------------------------------
# Animations — lightweight, fast for older hardware
# ---------------------------------------------------------------------------
animations {
    enabled = true
    first_launch_animation = false

    bezier = quick, 0.25, 0.1, 0.25, 1

    animation = windows,    1, 3, quick
    animation = windowsOut, 1, 3, quick, popin 80%
    animation = fade,       1, 3, quick
    animation = workspaces, 1, 3, quick
}

# ---------------------------------------------------------------------------
# Layouts
# ---------------------------------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
misc {
    force_default_wallpaper = 0
    vfr = true            # variable frame rate — essential for battery life
    disable_autoreload = true
}

# ---------------------------------------------------------------------------
# Window rules
# ---------------------------------------------------------------------------

# Float common dialogs
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(qt5ct)$
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = float, class:^(kvantum)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = size 70% 70%, class:^(pavucontrol)$
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$

# File manager (Thunar) — float small windows
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$

# Ghostty window class
windowrulev2 = tile, class:^(com.mitchellh.ghostty)$

# ---------------------------------------------------------------------------
# Scratchpads (special workspaces)
# ---------------------------------------------------------------------------
bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:scratchpad
workspace = special:scratchpad, on-created-empty:ghostty

bind = $mainMod, V, togglespecialworkspace, volume
windowrulev2 = workspace special:volume silent, class:^(pavucontrol)$

# ---------------------------------------------------------------------------
# Keybindings — applications
# ---------------------------------------------------------------------------
bind = $mainMod, Return, exec, ghostty
bind = $mainMod, E, exec, thunar
bind = $mainMod, Space, exec, rofi -show drun
bind = $mainMod SHIFT, Space, exec, rofi -show run
bind = $mainMod, period, exec, rofi -show emoji
bind = $mainMod, C, exec, rofi -show calc -modi calc -no-show-match -no-sort
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim - | swappy -f -

# Notifications
bind = $mainMod, N, exec, swaync-client -t -sw

# ---------------------------------------------------------------------------
# Keybindings — window management
# ---------------------------------------------------------------------------
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1  # maximise (no gaps)
bind = $mainMod, P, pseudo
bind = $mainMod, T, togglefloating
bind = $mainMod, X, pin                  # keep window on top across workspaces

# Vim-style focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Vim-style window movement
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Window grouping (tabbed containers, like i3 tabbed)
bind = $mainMod, G, togglegroup
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, Tab, changegroupactive, b

# Resize submap — enter with SUPER+R, resize with hjkl, exit with Escape/Enter
bind = $mainMod, R, submap, resize
submap = resize
binde = , l, resizeactive,  30 0
binde = , h, resizeactive, -30 0
binde = , k, resizeactive, 0 -30
binde = , j, resizeactive, 0  30
bind  = , escape, submap, reset
bind  = , Return, submap, reset
submap = reset

# ---------------------------------------------------------------------------
# Keybindings — workspaces
# ---------------------------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces on bar
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ---------------------------------------------------------------------------
# Keybindings — hardware
# ---------------------------------------------------------------------------
bindel = , XF86AudioRaiseVolume,  exec, pamixer -i 5
bindel = , XF86AudioLowerVolume,  exec, pamixer -d 5
bindl  = , XF86AudioMute,         exec, pamixer -t
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioMicMute,      exec, pamixer --default-source -t
