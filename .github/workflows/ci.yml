name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck is preinstalled on ubuntu-latest runners
      - name: ShellCheck
        run: |
          shellcheck -e SC1091,SC2034,SC2044,SC2046,SC2064,SC2086,SC2162 bin/executable_*.sh dot_macos

      - name: Bash syntax check
        run: |
          for f in bin/executable_*.sh; do
            echo "checking $f"
            bash -n "$f"
          done

      - name: Cache chezmoi
        id: cache-chezmoi
        uses: actions/cache@v4
        with:
          path: ~/bin/chezmoi
          key: chezmoi-${{ runner.os }}-v1

      - name: Install chezmoi
        if: steps.cache-chezmoi.outputs.cache-hit != 'true'
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"

      - name: Add chezmoi to PATH
        run: echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Zsh syntax check
        run: |
          sudo apt-get install -y zsh
          chezmoi execute-template --init < dot_zshrc.tmpl > /tmp/dot_zshrc
          zsh -n /tmp/dot_zshrc

  lua:
    name: Lua lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check

      - name: Luacheck neovim config
        run: |
          luacheck dot_config/nvim \
            --globals vim \
            --no-unused-args \
            --no-max-line-length

  neovim:
    name: Neovim startup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `stable` is a moving tag — rotate the cache key weekly so CI picks up
      # new stable releases without going indefinitely stale.
      - name: Compute cache rotation key
        id: cache-key
        run: echo "week=$(date +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Cache neovim binary
        id: cache-nvim
        uses: actions/cache@v4
        with:
          path: nvim-linux-x86_64
          key: nvim-${{ runner.os }}-stable-${{ steps.cache-key.outputs.week }}

      - name: Install neovim
        if: steps.cache-nvim.outputs.cache-hit != 'true'
        run: |
          curl -LO https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz
          rm nvim-linux-x86_64.tar.gz

      - name: Add neovim to PATH
        run: echo "$PWD/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      # Cache lazy.nvim's plugin dir, keyed by the plugin specs.  Any edit to
      # a feature file or init.lua invalidates the cache and re-installs.
      - name: Cache lazy.nvim plugins
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim
          key: lazy-${{ runner.os }}-${{ hashFiles('dot_config/nvim/lua/features/*.lua', 'dot_config/nvim/init.lua') }}
          restore-keys: |
            lazy-${{ runner.os }}-

      - name: Neovim headless startup
        run: |
          # Point neovim at our config from the repo
          export XDG_CONFIG_HOME="$PWD/dot_config"

          # Install plugins and quit — capture stderr
          NVIM_ERR=$(nvim --headless \
            "+Lazy! install" \
            "+lua vim.cmd('qall!')" 2>&1) || true

          # Filter known-benign noise
          NVIM_ERR=$(echo "$NVIM_ERR" | grep -iE "^e[0-9]+:|error|deprecat" || true)

          if [ -n "$NVIM_ERR" ]; then
            echo "::error::Neovim startup produced errors:"
            echo "$NVIM_ERR"
            exit 1
          fi
          echo "Neovim started cleanly"

      - name: Neovim filetype smoke tests
        run: |
          # Open a minimal file for each filetype so lazy-loaded plugins (e.g.
          # lsp.lua on BufReadPre, render-markdown on ft=markdown) actually run
          # their config functions. Plugin cache is warm from the previous step.
          export XDG_CONFIG_HOME="$PWD/dot_config"
          FAILED=0
          # ext:content pairs — content just needs to trigger filetype detection
          for pair in \
            "lua:-- test" \
            "md:# test" \
            "py:# test" \
            "sh:#!/bin/bash" \
            "ts:// test" \
            "js:// test" \
            "ex:# test" \
            "rs:// test" \
            "c:// test" \
            "rb:# test"
          do
            ext="${pair%%:*}"
            content="${pair#*:}"
            TMP=$(mktemp --suffix=".$ext")
            printf '%s\n' "$content" > "$TMP"
            ERR=$(nvim --headless "$TMP" \
              "+lua vim.cmd('qall!')" 2>&1) || true
            ERR=$(echo "$ERR" | grep -iE "^e[0-9]+:|error|deprecat" || true)
            rm -f "$TMP"
            if [ -n "$ERR" ]; then
              echo "::error::Neovim errors opening .$ext file:"
              echo "$ERR"
              FAILED=1
            else
              echo "OK: .$ext"
            fi
          done
          exit $FAILED

  chezmoi:
    name: Chezmoi & git config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache chezmoi
        id: cache-chezmoi
        uses: actions/cache@v4
        with:
          path: ~/bin/chezmoi
          key: chezmoi-${{ runner.os }}-v1

      - name: Install chezmoi
        if: steps.cache-chezmoi.outputs.cache-hit != 'true'
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"

      - name: Add chezmoi to PATH
        run: echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Validate git config
        run: |
          TMPFILE=$(mktemp)
          chezmoi execute-template --init < dot_gitconfig.tmpl > "$TMPFILE"
          if ! git config --file "$TMPFILE" --list > /dev/null; then
            echo "::error::dot_gitconfig.tmpl is not valid git config"
            git config --file "$TMPFILE" --list
            exit 1
          fi
          echo "Git config is valid"

      - name: Validate all templates
        run: |
          FAILED=0
          for f in $(find . -name '*.tmpl' -not -path './.git/*'); do
            echo "checking $f"
            if ! chezmoi execute-template --init < "$f" > /dev/null 2>&1; then
              # Templates using 1Password functions can't render in CI — skip them
              ERR=$(chezmoi execute-template --init < "$f" 2>&1 || true)
              if echo "$ERR" | grep -qi "onepassword\|1password\|op:"; then
                echo "  skipped (requires 1Password)"
              else
                echo "::error::Template failed to render: $f"
                echo "$ERR"
                FAILED=1
              fi
            fi
          done
          exit $FAILED
